<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>劉姥姥的相片館 - 終極修正版</title>
    <style>
        body {
            background: #060709;
            margin: 0;
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .minimal-btn {
            transition: all 0.2s ease-in-out;
            border: none;
            font-size: 13px;
            letter-spacing: 1px;
            -webkit-tap-highlight-color: transparent;
        }
        .minimal-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .minimal-btn:active {
            transform: translateY(0px);
        }
        select:focus {
            border-color: #ffcc00 !important;
        }
        input[type=range] {
            -webkit-appearance: none;
            background: #252833;
            border-radius: 4px;
            height: 6px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="app_box" style="padding: 20px; background: #0d0e12; border-radius: 12px; width: 100%; max-width: 480px; color: #f3f4f6; font-family: 'PMingLiU', 'MingLiU', serif; box-shadow: 0 20px 40px rgba(0,0,0,0.6); border: 1px solid #272930; letter-spacing: 0.5px; box-sizing: border-box;">
        
        <div style="background: #ffcc00; padding: 15px; border-radius: 8px; margin-bottom: 16px; border: 3px solid #ffffff; box-shadow: 0 0 15px rgba(255,204,0,0.5); color: #000000;">
            <label style="font-size: 15px; font-weight: bold; display: block; margin-bottom: 6px; text-align: center;">⚡️ 核心功能：請在這裡切換相機 ⚡️</label>
            <select id="camera_select" style="width: 100%; padding: 12px; background: #ffffff; color: #000000; border: 2px solid #000000; border-radius: 6px; outline: none; cursor: pointer; font-family: sans-serif; font-size: 16px; font-weight: bold; text-align: center;">
                <option value="user" selected>📸 使用：前置自拍鏡頭 (Front)</option>
                <option value="environment">📸 使用：後置一般鏡頭 (Rear)</option>
            </select>
        </div>

        <h3 style="margin-top:0; color: #ffffff; border-bottom: 1px solid #23252d; padding-bottom: 14px; text-align: center; font-size: 20px; letter-spacing: 4px; font-weight: 400; text-shadow: 0 2px 4px rgba(0,0,0,0.3);">劉姥姥的相片館</h3>

        <div id="camera_container" style="position: relative; margin: 16px 0; background: #000; border-radius: 6px; overflow: hidden; width: 100%; aspect-ratio: 1/1; border: 1px solid #1f2128; touch-action: none;">
            <div id="countdown_overlay" style="position: absolute; top:0; left:0; width:100%; height:100%; display:flex; justify-content:center; align-items:center; font-size:80px; color:#ffffff; font-weight:300; background:rgba(0,0,0,0.7); z-index:10; pointer-events:none; display:none; font-family: sans-serif;"></div>
        </div>
       
        <div style="display: flex; justify-content: space-around; background: #13151a; padding: 10px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #1f2128; font-size: 11px; color: #8a8f9d;">
            <div style="text-align: center;">👉 提示：請選取特效後，「按住貼圖」滑動拖曳</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
            <div>
                <label style="font-size: 12px; color: #8a8f9d; font-weight: normal;">📐 構圖輔助線</label><br>
                <select id="mode_select" style="width: 100%; padding: 8px; background: #13151a; color: #ffffff; border: 1px solid #272930; border-radius: 6px; margin-top: 6px; outline: none; cursor: pointer; font-family: 'PMingLiU', serif; font-size: 12px; transition: border 0.2s;">
                    <option value="none">無輔助線</option>
                    <option value="grid">九宮格構圖 (Grid)</option>
                    <option value="spiral">黃金螺旋 (Golden Spiral)</option>
                </select>
            </div>
            <div>
                <label style="font-size: 12px; color: #8a8f9d; font-weight: normal;">🎨 特效與貼圖</label><br>
                <select id="effect_select" style="width: 100%; padding: 8px; background: #13151a; color: #ffffff; border: 1px solid #272930; border-radius: 6px; margin-top: 6px; outline: none; cursor: pointer; font-family: 'PMingLiU', serif; font-size: 12px; transition: border 0.2s;">
                    <option value="none">原圖正常 (Normal)</option>
                    <option value="polaroid" selected>復古柔焦拍立得 📸</option>
                    <option value="haha">哈哈鏡特效 (Distortion)</option>
                    <option value="glasses">潮流黑色墨鏡 🕶️</option>
                    <option value="horns">兩側惡魔彎角 😈</option>
                    <option value="clown">小丑紅鼻子 🔴</option>
                </select>
            </div>
        </div>

        <div id="manual_controls" style="background: #13151a; padding: 10px; border-radius: 6px; margin-bottom: 20px; font-size: 12px; border: 1px solid #1f2128; display:none; color: #8a8f9d;">
            📏 調整貼圖尺寸：
            <input type="range" id="sticker_size" min="40" max="250" value="130" style="width:45%; vertical-align: middle; margin-left: 10px; cursor: pointer;">
        </div>

        <div style="display: flex; gap: 8px; margin-bottom: 20px;">
            <button id="btn_instant" class="minimal-btn" style="flex: 1.3; padding: 10px; background: #ffffff; color: #0d0e12; border-radius: 6px; font-weight: bold; cursor: pointer; font-family: 'PMingLiU', serif;">📸 瞬間即拍</button>
            <button id="btn_3s" class="minimal-btn" style="flex: 0.9; padding: 10px; background: #2f5ac7; color: #ffffff; border-radius: 6px; font-weight: normal; cursor: pointer; font-family: 'PMingLiU', serif;">⏳ 3秒</button>
            <button id="btn_5s" class="minimal-btn" style="flex: 0.9; padding: 10px; background: #1c3d94; color: #ffffff; border-radius: 6px; font-weight: normal; cursor: pointer; font-family: 'PMingLiU', serif;">⏳ 5秒</button>
            <button id="stop_btn" class="minimal-btn" style="flex: 0.8; padding: 10px; background: #252730; color: #a5aab8; border-radius: 6px; font-weight: normal; cursor: pointer; font-family: 'PMingLiU', serif; border: 1px solid #31343f;">🛑 關閉</button>
        </div>

        <div style="border-top: 1px solid #1f2128; padding-top: 16px;">
            <p style="margin-top: 0; font-size: 13px; color: #ffffff; font-weight: normal; letter-spacing: 1px;">🖼️ 沖洗照片成果</p>
            <div id="photo_result" style="text-align: center; color: #626775; font-style: normal; background: #08090c; padding: 16px; border-radius: 6px; min-height: 60px; border: 1px solid #1f2128; display: flex; justify-content: center; align-items: center; font-size: 12px; box-sizing: border-box;">
                等待快門觸發，影像將在此呈現...
            </div>
        </div>
    </div>

   <script>
    async function initApp() {
        const container = document.getElementById('camera_container');
        const cameraSelect = document.getElementById('camera_select');
        const modeSelect = document.getElementById('mode_select');
        const effectSelect = document.getElementById('effect_select');
        const btnInstant = document.getElementById('btn_instant');
        const btn3s = document.getElementById('btn_3s');
        const btn5s = document.getElementById('btn_5s');
        const stopBtn = document.getElementById('stop_btn');
        const photoResult = document.getElementById('photo_result');
        const countdownOverlay = document.getElementById('countdown_overlay');
        const manualControls = document.getElementById('manual_controls');
        const stickerSizeInput = document.getElementById('sticker_size');

        let stream = null;
        let video = document.createElement('video');
        
        video.style.position = 'absolute';
        video.style.top = '0'; video.style.left = '0';
        video.style.width = '100%'; video.style.height = '100%';
        video.style.objectFit = 'cover';
        video.setAttribute('playsinline', ''); 
        container.appendChild(video);

        const canvas = document.createElement('canvas');
        canvas.style.position = 'absolute'; canvas.style.left = '0px'; canvas.style.top = '0px';
        canvas.style.width = '100%'; canvas.style.height = '100%';
        canvas.style.objectFit = 'cover';
        container.appendChild(canvas);
        const ctx = canvas.getContext('2d');

        const snapshotCanvas = document.createElement('canvas');
        const sCtx = snapshotCanvas.getContext('2d');

        const procCanvas = document.createElement('canvas');
        const filterCanvas = document.createElement('canvas');
        const fCtx = filterCanvas.getContext('2d');

        let isRunning = true; let isCounting = false;
        
        let stickerX = 200; let stickerY = 200; let stickerW = 130;
        let isDragging = false;
        let lastX = 0; let lastY = 0;

        const resizeCanvasToContainer = () => {
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            snapshotCanvas.width = rect.width;
            snapshotCanvas.height = rect.height;
            
            stickerX = canvas.width / 2;
            stickerY = canvas.height / 2;
        };

        cameraSelect.onchange = () => {
            if (isRunning) startCamera(cameraSelect.value);
        };

        function dragStart(clientX, clientY) {
            const eff = effectSelect.value;
            if (eff !== "glasses" && eff !== "horns" && eff !== "clown") return;
            isDragging = true;
            lastX = clientX;
            lastY = clientY;
        }

        function dragMove(clientX, clientY) {
            if (!isDragging) return;
            const rect = container.getBoundingClientRect();
            
            let moveX = ((clientX - lastX) / rect.width) * canvas.width;
            let moveY = ((clientY - lastY) / rect.height) * canvas.height;

            let newX, newY;
            
            // 精準物理判定
            if (cameraSelect.value === "user") {
                newX = stickerX - moveX;  // 自拍模式反向修正
            } else {
                newX = stickerX + moveX;  // 一般模式正向移動
            }
            newY = stickerY + moveY;

            if (newX < 0) newX = 0; if (newX > canvas.width) newX = canvas.width;
            if (newY < 0) newY = 0; if (newY > canvas.height) newY = canvas.height;

            stickerX = newX;
            stickerY = newY;
            
            lastX = clientX;
            lastY = clientY;
        }

        function dragEnd() { isDragging = false; }

        container.onmousedown = (e) => { dragStart(e.clientX, e.clientY); };
        window.onmousemove = (e) => { dragMove(e.clientX, e.clientY); };
        window.onmouseup = () => { dragEnd(); };

        container.ontouchstart = (e) => { 
            if (e.touches.length > 0) dragStart(e.touches[0].clientX, e.touches[0].clientY);
        };
        container.ontouchmove = (e) => { 
            if (isDragging && e.touches.length > 0) {
                dragMove(e.touches[0].clientX, e.touches[0].clientY);
                e.preventDefault();
            }
        };
        container.ontouchend = () => { dragEnd(); };

        async function startCamera(facingMode) {
            if (stream) { stream.getTracks().forEach(track => track.stop()); }
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 720 } } 
                }); 
                video.srcObject = stream;
                
                if (facingMode === "user") { video.style.transform = 'scaleX(-1)'; } 
                else { video.style.transform = 'none'; }
                await video.play();
                resizeCanvasToContainer();
            } catch (err) {
                console.log("鏡頭錯誤: ", err);
            }
        }

        video.onloadedmetadata = () => { resizeCanvasToContainer(); };
        window.addEventListener('resize', () => { resizeCanvasToContainer(); });

        window.onkeydown = (e) => {
            if (isCounting || !isRunning) return;
            if (e.key === " ") { e.preventDefault(); triggerInstantCapture(); }
            if (e.key === "3") startCountdown(3);
            if (e.key === "5") startCountdown(5);
        };

        btnInstant.onclick = () => { if(!isCounting && isRunning) triggerInstantCapture(); };
        btn3s.onclick = () => { if(!isCounting && isRunning) startCountdown(3); };
        btn5s.onclick = () => { if(!isCounting && isRunning) startCountdown(5); };

        function drawTrendyGlasses(tCtx, cx, cy, w) {
            let h = w * 0.35; tCtx.save();
            tCtx.shadowColor = "rgba(0,0,0,0.4)"; tCtx.shadowBlur = 8; tCtx.shadowOffsetY = 4;
            tCtx.fillStyle = "#111111"; tCtx.strokeStyle = "#000000"; tCtx.lineWidth = 2;
            tCtx.beginPath(); tCtx.moveTo(cx - w*0.48, cy - h*0.2); tCtx.bezierCurveTo(cx - w*0.45, cy - h*0.7, cx - w*0.08, cy - h*0.7, cx - w*0.05, cy - h*0.2); tCtx.bezierCurveTo(cx - w*0.04, cy + h*0.5, cx - w*0.40, cy + h*0.7, cx - w*0.48, cy - h*0.2); tCtx.fill(); tCtx.stroke();
            tCtx.beginPath(); tCtx.moveTo(cx + w*0.05, cy - h*0.2); tCtx.bezierCurveTo(cx + w*0.08, cy - h*0.7, cx + w*0.45, cy - h*0.7, cx + w*0.48, cy - h*0.2); tCtx.bezierCurveTo(cx + w*0.48, cy + h*0.7, cx + w*0.04, cy + h*0.5, cx + w*0.05, cy - h*0.2); tCtx.fill(); tCtx.stroke();
            tCtx.beginPath(); tCtx.moveTo(cx - w*0.06, cy - h*0.3); tCtx.quadraticCurveTo(cx, cy - h*0.4, cx + w*0.06, cy - h*0.3); tCtx.lineWidth = 5; tCtx.stroke();
            tCtx.shadowBlur = 0; tCtx.shadowOffsetY = 0; tCtx.strokeStyle = "rgba(255,255,255,0.4)"; tCtx.lineWidth = 3;
            tCtx.beginPath(); tCtx.moveTo(cx - w*0.35, cy - h*0.3); tCtx.lineTo(cx - w*0.25, cy + h*0.2); tCtx.stroke();
            tCtx.beginPath(); tCtx.moveTo(cx + w*0.18, cy - h*0.3); tCtx.lineTo(cx + w*0.28, cy + h*0.2); tCtx.stroke();
            tCtx.restore();
        }

        function drawDevilHorns(tCtx, cx, cy, w) {
            let hornSize = w * 0.35; let topY = cy - w * 0.35; tCtx.save();
            tCtx.fillStyle = "#d63031"; tCtx.strokeStyle = "#2d3436"; tCtx.lineWidth = 2;
            let lx = cx - w * 0.35; tCtx.beginPath(); tCtx.moveTo(lx, topY); tCtx.bezierCurveTo(lx - hornSize*0.4, topY - hornSize*0.5, lx - hornSize*0.6, topY - hornSize, lx - hornSize*0.8, topY - hornSize*1.1); tCtx.bezierCurveTo(lx - hornSize*0.3, topY - hornSize*0.9, lx - hornSize*0.1, topY - hornSize*0.4, lx + hornSize*0.3, topY - hornSize*0.2); tCtx.closePath(); tCtx.fill(); tCtx.stroke();
            let rx = cx + w * 0.35; tCtx.beginPath(); tCtx.moveTo(rx, topY); tCtx.bezierCurveTo(rx + hornSize*0.4, topY - hornSize*0.5, rx + hornSize*0.6, topY - hornSize, rx + hornSize*0.8, topY - hornSize*1.1); tCtx.bezierCurveTo(rx + hornSize*0.3, topY - hornSize*0.9, rx + hornSize*0.1, topY - hornSize*0.4, rx - hornSize*0.3, topY - hornSize*0.2); tCtx.closePath(); tCtx.fill(); tCtx.stroke();
            tCtx.restore();
        }

        function drawClownNose(tCtx, cx, cy, w) {
            let radius = w * 0.16; tCtx.save();
            tCtx.beginPath(); tCtx.arc(cx, cy + w*0.05, radius, 0, Math.PI * 2); tCtx.fillStyle = "#ff1744"; tCtx.shadowColor = "rgba(0,0,0,0.4)"; tCtx.shadowBlur = 6; tCtx.shadowOffsetY = 3; tCtx.fill();
            tCtx.shadowColor = "transparent"; tCtx.beginPath(); tCtx.arc(cx - radius*0.3, (cy + w*0.05) - radius*0.3, radius*0.22, 0, Math.PI * 2); tCtx.fillStyle = "#ffffff"; tCtx.fill();
            tCtx.restore();
        }

        function drawPolaroidFilter(srcCanvas, targetCtx, bx, by, iw, ih) {
            filterCanvas.width = iw; filterCanvas.height = ih;
            fCtx.drawImage(srcCanvas, bx, by, iw, ih);
            let imgData = fCtx.getImageData(0, 0, iw, ih);
            let d = imgData.data;
            for (let i = 0; i < d.length; i += 4) {
                d[i] = Math.min(255, d[i] * 0.95 + 10);    
                d[i+1] = Math.min(255, d[i+1] * 0.92 + 15);
                d[i+2] = Math.max(0, d[i+2] * 0.85);        
            }
            fCtx.putImageData(imgData, 0, 0);
            targetCtx.save(); targetCtx.globalAlpha = 0.45;
            targetCtx.drawImage(filterCanvas, bx, by, iw, ih);
            targetCtx.restore();
        }

        function renderLayers(targetCtx, showGridLines) {
            let w = canvas.width; let h = canvas.height; let eff = effectSelect.value;
            let isUserCam = (cameraSelect.value === "user");
           
            if (eff === "polaroid") {
                procCanvas.width = w; procCanvas.height = h;
                const tmpCtx = procCanvas.getContext('2d');
                if (isUserCam) { tmpCtx.translate(w, 0); tmpCtx.scale(-1, 1); }
                let vW = video.videoWidth; let vH = video.videoHeight;
                let vRatio = vW / vH; let cRatio = w / h;
                let sW, sH, sX, sY;
                if (cRatio > vRatio) { sW = vW; sH = vW / cRatio; sX = 0; sY = (vH - sH) / 2; }
                else { sH = vH; sW = vH * cRatio; sX = (vW - sW) / 2; sY = 0; }
                tmpCtx.drawImage(video, sX, sY, sW, sH, 0, 0, w, h);

                targetCtx.fillStyle = "#fbfbf8"; targetCtx.fillRect(0, 0, w, h);
                let bx = w * 0.08; let by = h * 0.06; let iw = w - (bx * 2); let ih = h - (by * 2.5);
                drawPolaroidFilter(procCanvas, targetCtx, bx, by, iw, ih);
                targetCtx.fillStyle = "#4b5563"; targetCtx.font = "italic bold 12px Courier New";
                let d = new Date(); targetCtx.fillText(`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} FILM`, bx + 6, h - by - 14);
            }
            else {
                targetCtx.save(); 
                if (isUserCam) { targetCtx.translate(w, 0); targetCtx.scale(-1, 1); }
                let vW = video.videoWidth; let vH = video.videoHeight;
                let vRatio = vW / vH; let cRatio = w / h;
                let sW, sH, sX, sY;
                if (cRatio > vRatio) { sW = vW; sH = vW / cRatio; sX = 0; sY = (vH - sH) / 2; }
                else { sH = vH; sW = vH * cRatio; sX = (vW - sW) / 2; sY = 0; }

                if (eff === "haha") {
                    procCanvas.width = w; procCanvas.height = h;
                    const tmpCtx2 = procCanvas.getContext('2d');
                    tmpCtx2.drawImage(video, sX, sY, sW, sH, 0, 0, w, h);
                    let imgData = tmpCtx2.getImageData(0, 0, w, h); let src = new Uint32Array(imgData.data.buffer);
                    let outData = tmpCtx2.createImageData(w, h); let dst = new Uint32Array(outData.data.buffer); dst.set(src);
                    let cx = w / 2; let cy = h / 2; let radius = Math.min(w, h) * 0.35;
                    for (let y = 0; y < h; y++) {
                        for (let x = 0; x < w; x++) {
                            let dx = x - cx; let dy = y - cy; let distance = Math.sqrt(dx*dx + dy*dy);
                            if (distance < radius) {
                                let factor = Math.pow(Math.sin((distance / radius) * (Math.PI / 2)), 0.5);
                                let sx_coord = Math.floor(cx + dx * factor); let sy_coord = Math.floor(cy + dy * factor);
                                if (sx_coord >= 0 && sx_coord < w && sy_coord >= 0 && sy_coord < h) { dst[y * w + x] = src[sy_coord * w + sx_coord]; }
                            }
                        }
                    }
                    targetCtx.putImageData(outData, 0, 0);
                } else { targetCtx.drawImage(video, sX, sY, sW, sH, 0, 0, w, h); }
                targetCtx.restore();
            }

            if (eff === "glasses" || eff === "horns" || eff === "clown") {
                stickerW = parseInt(stickerSizeInput.value);
                if (eff === "glasses") drawTrendyGlasses(targetCtx, stickerX, stickerY, stickerW);
                else if (eff === "horns") drawDevilHorns(targetCtx, stickerX, stickerY, stickerW);
                else if (eff === "clown") drawClownNose(targetCtx, stickerX, stickerY, stickerW);
            }
        }

        function outputFinalPhoto() {
            sCtx.clearRect(0, 0, canvas.width, canvas.height);
            renderLayers(sCtx, false);
            const outCanvas = document.createElement('canvas');
            outCanvas.width = canvas.width; outCanvas.height = canvas.height;
            const oCtx = outCanvas.getContext('2d');
            if (effectSelect.value !== "polaroid" && cameraSelect.value === "user") {
                oCtx.translate(canvas.width, 0); oCtx.scale(-1, 1);
            }
            oCtx.drawImage(snapshotCanvas, 0, 0);
            const imgUrl = outCanvas.toDataURL('image/jpeg');
            photoResult.innerHTML = `<div style="width:100%; text-align:center;"><img src="${imgUrl}" style="max-width:100%; border-radius:4px;"/><p style="color:#ffffff;">✨ 相片已沖洗</p></div>`;
        }

        function triggerInstantCapture() { outputFinalPhoto(); }
        function startCountdown(seconds) {
            isCounting = true; countdownOverlay.style.display = 'flex'; let current = seconds; countdownOverlay.innerText = current;
            const timer = setInterval(() => {
                current--;
                if (current > 0) { countdownOverlay.innerText = current; }
                else { clearInterval(timer); countdownOverlay.style.display = 'none'; outputFinalPhoto(); isCounting = false; }
            }, 1000);
        }

        const renderLoop = () => {
            if (!isRunning) return;
            let eff = effectSelect.value;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (eff === "glasses" || eff === "horns" || eff === "clown") { manualControls.style.display = 'block'; } 
            else { manualControls.style.display = 'none'; }
            renderLayers(ctx, true);
            requestAnimationFrame(renderLoop);
        };
       
        await startCamera("user");
        resizeCanvasToContainer();
        renderLoop();

        stopBtn.onclick = () => {
            isRunning = false; if (stream) { stream.getTracks().forEach(track => track.stop()); }
            container.innerHTML = `🔒 裝置已斷開連線`;
        };
    }
    initApp();
    </script>
</body>
</html>
